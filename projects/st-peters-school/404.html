<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | St. Peter's International School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2306b6d4' opacity='0.15'/><path d='M16 4L4 12v16h10V20h4v8h10V12L16 4z' fill='%2306b6d4' opacity='0.6'/></svg>">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .error-page{min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .error-code{font-family:var(--font-display);font-size:clamp(80px,15vw,160px);font-weight:800;letter-spacing:-0.06em;background:linear-gradient(135deg,var(--accent),var(--accent-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
    .error-title{font-size:clamp(20px,3vw,28px);font-weight:700;margin:16px 0 8px}
    .error-desc{color:var(--text-soft);font-size:14px;max-width:400px;margin:0 auto 24px;line-height:1.6}
  </style>
</head>
<body>
  <main class="error-page">
    <div>
      <div class="error-code">404</div>
      <h1 class="error-title">Page not found</h1>
      <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <a href="index.html" class="btn btn-primary">Go Home</a>
        <a href="gallery.html" class="btn btn-outline">Browse Gallery</a>
      </div>
    </div>
  </main>
</body>
</html>
