<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — St. Peter's International School</title>
  <meta name="description" content="Browse our activity gallery — Academics, Sports, Events, Cultural, Facilities, Student Life, and Achievements." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2306b6d4' opacity='0.15'/><path d='M16 4L4 12v16h10V20h4v8h10V12L16 4z' fill='%2306b6d4' opacity='0.6'/></svg>">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="gallery.css" />
  <script src="components/component-loader.js"></script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <div data-include="header"></div>

  <main id="main">
    <section class="page-hero" style="background: var(--page-hero-bg);">
      <div class="page-hero-bg"></div>
      <div class="page-hero-content">
        <h1 class="page-hero-title">Activity Gallery</h1>
        <p class="page-hero-sub">Moments that capture the spirit of St. Peter's — from classroom discoveries to stadium victories.</p>
      </div>
    </section>

    <section class="section" id="gallery">
      <div class="gallery-toolbar" data-reveal>
        <div class="gallery-filters" role="group" aria-label="Filter by category">
          <button class="gallery-filter active" data-filter="all" aria-pressed="true">All</button>
          <button class="gallery-filter" data-filter="academics" aria-pressed="false">Academics</button>
          <button class="gallery-filter" data-filter="sports" aria-pressed="false">Sports</button>
          <button class="gallery-filter" data-filter="events" aria-pressed="false">Events</button>
          <button class="gallery-filter" data-filter="cultural" aria-pressed="false">Cultural</button>
          <button class="gallery-filter" data-filter="facilities" aria-pressed="false">Facilities</button>
          <button class="gallery-filter" data-filter="student-life" aria-pressed="false">Student Life</button>
          <button class="gallery-filter" data-filter="achievements" aria-pressed="false">Achievements</button>
        </div>
        <div class="gallery-sort">
          <label for="gallerySort" class="visually-hidden">Sort by</label>
          <select id="gallerySort" aria-label="Sort gallery">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="title">Title A-Z</option>
          </select>
        </div>
      </div>

      <div class="gallery-stats" aria-live="polite" id="galleryStats">
        42 photos
      </div>

      <div class="gallery-grid" id="galleryGrid" role="list"></div>

      <div class="gallery-empty" id="galleryEmpty" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 17"/></svg>
        <p>No images match your filter.</p>
        <button class="btn btn-outline" id="clearFilters">Clear filters</button>
      </div>
    </section>
  </main>

  <div data-include="footer"></div>

  <!-- Lightbox Modal -->
  <div class="lightbox-overlay" id="lightbox" role="dialog" aria-modal="true" aria-labelledby="lbTitle" hidden>
    <button class="lightbox-close" id="lbClose" aria-label="Close lightbox">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lbPrev" aria-label="Previous image">&lsaquo;</button>
    <button class="lightbox-nav lightbox-next" id="lbNext" aria-label="Next image">&rsaquo;</button>
    <div class="lightbox-content">
      <figure>
        <img id="lbImage" alt="" loading="lazy">
        <figcaption>
          <h3 id="lbTitle"></h3>
          <div class="lightbox-meta">
            <span class="lightbox-category" id="lbCategory"></span>
            <time id="lbYear"></time>
          </div>
          <p id="lbDesc"></p>
        </figcaption>
      </figure>
    </div>
    <div class="lightbox-counter" id="lbCounter" aria-hidden="true"></div>
  </div>

  <!-- Gallery Data Script -->
  <script src="gallery-data.js"></script>
  <script src="gallery.js"></script>
  <script src="script.js"></script>
</body>
</html>
